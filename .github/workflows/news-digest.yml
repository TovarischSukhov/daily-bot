name: News Digest

on:
  schedule:
    - cron: "30 6 * * *"  # 06:30 UTC = 08:30 CEST (summer) / 07:30 CET (winter)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without sending to Slack"
        required: false
        default: "false"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # needed to commit seen.json back to the repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .

      - name: Run news digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python -m src.jobs.news --dry-run
          else
            python -m src.jobs.news
          fi

      # Persist the rolling "already covered" state back to the repo so local
      # and scheduled runs share one dedup history. Skipped on dry-run.
      - name: Persist seen.json
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen.json
            git commit -m "chore: update dedup history [skip ci]"
            git push
          else
            echo "seen.json unchanged; nothing to persist"
          fi
